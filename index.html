<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bridgeway Gospel Centre — Follow-up Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue:#0B79B7;--blue-deep:#075A89;--blue-ink:#06405f;--green:#4CCB4A;--green-deep:#34a832;
    --ink:#22323c;--paper:#eef4f9;--card:#fff;--line:#e1ebf3;--muted:#6a7a87;--white:#fff;
    --shadow:0 1px 2px rgba(7,64,95,.06),0 12px 30px -16px rgba(7,64,95,.28);
    --shadow-lg:0 30px 70px -28px rgba(7,64,95,.45);--r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3,.disp{font-family:'Archivo',sans-serif;letter-spacing:-.015em}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px;width:100%}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink);background:#f6fafd;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;width:100%;transition:border-color .15s,box-shadow .15s,background .15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(11,121,183,.13)}
  label{font-size:12.5px;font-weight:600;display:block;margin-bottom:6px;color:#3c4d57}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;padding:13px 24px;border-radius:11px;border:none;transition:background .2s,transform .12s,box-shadow .2s}
  .btn:active{transform:translateY(1px)}
  .btn-blue{background:var(--blue);color:#fff;box-shadow:0 10px 22px -12px rgba(11,121,183,.8)}.btn-blue:hover{background:var(--blue-deep)}
  .btn-green{background:var(--green);color:#06340c;box-shadow:0 10px 22px -12px rgba(76,203,74,.8)}.btn-green:hover{background:#5fe05c}
  .btn-ghost{background:#eef3f7;color:var(--muted)}.btn-ghost:hover{background:#e2eaf0}
  .btn[disabled]{opacity:.55;cursor:not-allowed;box-shadow:none}
  .muted{color:var(--muted)}
  .err{background:#fde8e8;border:1px solid #f5b5b5;color:#9b2222;padding:11px 14px;border-radius:11px;font-size:14px;margin-top:12px;display:none}

  /* ---------- LOGIN ---------- */
  .login{min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px;position:relative;overflow:hidden;background:radial-gradient(120% 120% at 0% 0%,var(--blue) 0%,var(--blue-deep) 55%,var(--blue-ink) 100%)}
  .login::before,.login::after{content:"";position:absolute;border-radius:50%;filter:blur(8px);opacity:.16}
  .login::before{width:420px;height:420px;background:var(--green);top:-140px;right:-120px}
  .login::after{width:320px;height:320px;background:#7fd0ff;bottom:-120px;left:-100px}
  .login-arch{position:absolute;left:-5%;right:-5%;bottom:8%;opacity:.18}
  .login-card{position:relative;background:#fff;border-radius:22px;box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:36px 30px;z-index:2}
  .login-logo{display:flex;justify-content:center;margin-bottom:14px}
  .login-logo img{width:150px;height:auto;display:block}
  .login h1{text-align:center;font-size:22px;color:var(--blue-ink);font-weight:800}
  .login p.sub{text-align:center;color:var(--muted);font-size:13px;margin:6px 0 24px;letter-spacing:.02em}
  .login .field{margin-bottom:15px}
  .pw-wrap{position:relative}
  .pw-wrap input{padding-right:48px}
  .pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);padding:8px;border-radius:8px;display:grid;place-items:center}
  .pw-toggle:hover{color:var(--blue);background:#eef6fb}
  .login .btn{width:100%;margin-top:6px}

  /* ---------- APP SHELL ---------- */
  .app{display:none}
  header.bar{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;height:62px;gap:10px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand img{height:28px;width:auto;display:block}
  .brand b{font-family:'Archivo';font-weight:800;color:var(--blue-ink);font-size:14.5px;letter-spacing:.02em;line-height:1.05}
  .brand small{display:block;font-weight:700;font-size:9.5px;letter-spacing:.15em;color:var(--green-deep);text-transform:uppercase}
  .who{display:flex;align-items:center;gap:10px;font-size:13px}
  .who .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-ink));color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;font-family:'Archivo';flex:none}
  .who .meta{line-height:1.15;text-align:right}
  .who .meta b{font-size:13px;color:var(--blue-ink)}
  .who .meta span{display:block;font-size:10.5px;color:var(--green-deep);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .logout{background:#f1f5f8;border:none;color:var(--muted);font-weight:600;font-size:12.5px;padding:9px 13px;border-radius:9px}
  .logout:hover{color:#9b2222;background:#fbeaea}
  @media(max-width:520px){.who .meta{display:none}.brand small{display:none}}

  .page-head{padding:26px 0 4px}
  .page-head h1{font-size:24px;color:var(--blue-ink);font-weight:800}
  .page-head p{color:var(--muted);font-size:14px;margin-top:3px}
  .tabs{display:flex;gap:4px;background:#e2ecf4;padding:5px;border-radius:13px;margin:18px 0 20px;width:fit-content;max-width:100%;overflow:auto}
  .tab{background:none;border:none;padding:9px 17px;font-weight:700;font-size:13.5px;color:var(--muted);border-radius:9px;white-space:nowrap;transition:background .15s,color .15s}
  .tab.active{color:var(--blue-ink);background:#fff;box-shadow:var(--shadow)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
  .card h2{font-size:17px;color:var(--blue-ink);font-weight:800;margin-bottom:3px}
  .card .lead{color:var(--muted);font-size:13.5px;margin-bottom:16px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
  .row .full{grid-column:1/-1}
  @media(max-width:560px){.row{grid-template-columns:1fr}}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
  @media(max-width:680px){.stats{grid-template-columns:1fr 1fr}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .stat .ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;margin-bottom:10px}
  .stat .v{font-family:'Archivo';font-weight:800;font-size:24px;color:var(--blue-ink);line-height:1}
  .stat .k{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:5px}

  /* member search */
  .search-box{position:relative}
  .results{position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-lg);max-height:300px;overflow:auto;z-index:20;display:none}
  .results.show{display:block}
  .res-item{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #eef3f7}
  .res-item:last-child{border-bottom:none}
  .res-item:hover{background:#eef6fb}
  .res-item .nm{font-size:14px;font-weight:600;color:var(--ink)}
  .res-item small{display:block;color:var(--muted);font-size:12px;font-weight:400}
  .avatar-sm{width:36px;height:36px;border-radius:50%;flex:none;object-fit:cover;background:linear-gradient(135deg,#bcd9ee,#8fc0e0);display:grid;place-items:center;color:var(--blue-ink);font-weight:800;font-size:13px;font-family:'Archivo';overflow:hidden}
  .avatar-sm img{width:100%;height:100%;object-fit:cover}
  .picked{display:none;align-items:center;gap:12px;background:#eefcef;border:1px solid #bfe9c0;border-radius:13px;padding:12px 14px;margin-top:12px}
  .picked.show{display:flex}
  .picked .px-name{font-weight:700;color:var(--blue-ink)}
  .picked .px-dept{font-size:12.5px;color:var(--muted)}
  .picked .px-clear{margin-left:auto;background:#fff;border:1px solid var(--line);color:#9b2222;font-weight:600;font-size:12.5px;padding:7px 12px;border-radius:8px}

  /* phone link */
  .phone-link{color:var(--blue);font-weight:600;text-decoration:none;white-space:nowrap}
  .phone-link:hover{text-decoration:underline}

  /* table -> cards on mobile */
  .tbl{width:100%;border-collapse:collapse;font-size:13.5px}
  .tbl th{text-align:left;color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:11px 12px;border-bottom:2px solid var(--line)}
  .tbl td{padding:13px 12px;border-bottom:1px solid #eef3f7;vertical-align:top}
  .tbl tbody tr:hover{background:#f7fbfe}
  .pill{display:inline-block;background:#fde8e8;color:#9b2222;font-weight:700;font-size:11px;padding:3px 10px;border-radius:999px}
  .pill.present{background:#e7f7e8;color:#1f7a2a}
  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
  .toolbar .tb-field{display:flex;flex-direction:column;gap:5px}
  .toolbar .tb-field label{margin:0}
  .toolbar input,.toolbar select{max-width:210px}
  .toolbar input[type=date]{max-width:165px}
  .toolbar .tb-clear{background:#eef3f7;border:none;color:var(--muted);font-weight:600;font-size:13px;padding:12px 15px;border-radius:11px;align-self:flex-end}
  .toolbar .tb-clear:hover{background:#e2eaf0;color:var(--blue-ink)}
  .filter-note{font-size:12.5px;color:var(--muted);margin-bottom:12px}
  @media(max-width:720px){
    .toolbar{gap:10px}
    .toolbar .tb-field{flex:1 1 100%}
    .toolbar input,.toolbar select,.toolbar input[type=date]{max-width:none;width:100%}
    .toolbar .tb-clear{width:100%}
  }
  @media(max-width:620px){
    .tbl thead{display:none}
    .tbl,.tbl tbody,.tbl tr,.tbl td{display:block;width:100%}
    .tbl tr{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;padding:6px 4px;background:#fff}
    .tbl td{border:none;padding:8px 14px;display:flex;justify-content:space-between;gap:14px;text-align:right}
    .tbl td::before{content:attr(data-label);color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;text-align:left}
  }
  .empty{text-align:center;color:var(--muted);padding:36px 20px;font-size:14px}
  .empty svg{display:block;margin:0 auto 12px;opacity:.4}
  .skeleton{height:14px;border-radius:6px;background:linear-gradient(90deg,#eef3f7,#e1ebf3,#eef3f7);background-size:200% 100%;animation:sh 1.2s infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:none}
  @keyframes rot{to{transform:rotate(360deg)}}

  .u-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #eef3f7}
  .u-row:last-child{border-bottom:none}
  .u-row .u-main{flex:1;min-width:0}
  .u-row .u-main b{color:var(--blue-ink)}
  .u-row .u-main small{display:block;color:var(--muted);font-size:12.5px}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:999px;background:#eef6fb;color:var(--blue)}
  .tag.off{background:#f1f1f1;color:#999}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--blue-ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:100;display:flex;align-items:center;gap:10px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{background:#1f7a2a}.toast.bad{background:#9b2222}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login" id="loginView">
  <svg class="login-arch" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0 110 Q600 0 1200 110" fill="none" stroke="#4CCB4A" stroke-width="3"/></svg>
  <div class="login-card">
    <div class="login-logo"><img class="logo-img" alt="Bridgeway Gospel Centre logo"></div>
    <h1>Follow-up Portal</h1>
    <p class="sub">Bridgeway Gospel Centre</p>
    <div class="field"><label for="u">Username</label><input id="u" autocomplete="username" placeholder="Your username"></div>
    <div class="field"><label for="p">Password</label>
      <div class="pw-wrap">
        <input id="p" type="password" autocomplete="current-password" placeholder="Your password">
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="btn btn-blue" id="loginBtn"><span class="spin" id="loginSpin"></span><span id="loginLbl">Sign in</span></button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="appView">
  <header class="bar">
    <div class="wrap">
      <div class="brand"><img class="logo-img" alt="Bridgeway Gospel Centre logo"><div><b>Bridgeway</b><small>Follow-up Portal</small></div></div>
      <div class="who">
        <div class="meta"><b id="whoName"></b><span id="whoRole"></span></div>
        <div class="avatar" id="whoAvatar"></div>
        <button class="logout" id="logoutBtn">Log out</button>
      </div>
    </div>
  </header>
  <div class="wrap">
    <div class="page-head"><h1 id="pageTitle">Welcome</h1><p id="pageSub"></p></div>
    <div class="tabs" id="tabs"></div>
    <div id="panel"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ---- session ---- */
let session=null;
function saveSession(s){ session=s; try{ localStorage.setItem('bgc_session',JSON.stringify(s)); }catch(e){} }
function loadSession(){ if(session) return session; try{ const v=localStorage.getItem('bgc_session'); if(v) session=JSON.parse(v); }catch(e){} return session; }
function clearSession(){ session=null; try{ localStorage.removeItem('bgc_session'); }catch(e){} }

/* ---- API ---- */
async function api(action, payload={}){
  if(WEB_APP_URL.includes("PASTE_YOUR")) return {status:"error",message:"Set WEB_APP_URL at the top of the portal script."};
  try{
    const res=await fetch(WEB_APP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(Object.assign({action}, session?{token:session.token}:{}, payload))});
    return await res.json();
  }catch(err){ return {status:"error",message:String(err)}; }
}

/* ---- toast ---- */
let toastT;
function toast(msg, kind='ok'){ const t=document.getElementById('toast'); t.className='toast show '+kind; t.textContent=msg; clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2800); }

/* ---- login ---- */
const loginBtn=document.getElementById('loginBtn');
loginBtn.addEventListener('click',doLogin);
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('pwToggle').addEventListener('click',()=>{ const p=document.getElementById('p'); p.type=p.type==='password'?'text':'password'; });
async function doLogin(){
  const username=document.getElementById('u').value.trim(), password=document.getElementById('p').value;
  const errEl=document.getElementById('loginErr'); errEl.style.display='none';
  if(!username||!password){ errEl.textContent="Enter your username and password."; errEl.style.display='block'; return; }
  spin(true);
  const r=await api('login',{username,password});
  spin(false);
  if(r.status==='success'){ saveSession({token:r.token,role:r.role,name:r.name,departments:r.departments||[]}); enterApp(); }
  else { errEl.textContent=r.message||"Login failed."; errEl.style.display='block'; }
}
function spin(on){ document.getElementById('loginSpin').style.display=on?'inline-block':'none'; document.getElementById('loginLbl').textContent=on?'Signing in…':'Sign in'; loginBtn.disabled=on; }
document.getElementById('logoutBtn').addEventListener('click',()=>{ clearSession(); location.reload(); });

/* ---- enter ---- */
function initials(n){ return (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function enterApp(){
  const s=loadSession();
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='block';
  document.getElementById('whoName').textContent=s.name;
  document.getElementById('whoRole').textContent=s.role==='admin'?'Admin':'Follow-up';
  document.getElementById('whoAvatar').textContent=initials(s.name);
  buildTabs();
}

let membersCache=null, phoneMap=null;
const TAB_META={ report:['Report absence','Record a member who was not around'], reports:['All reports','Every absence logged across the church'],
  mine:['My reports','Absences you have submitted'], team:['Follow-up team','Manage logins for the follow-up team'] };
function buildTabs(){
  const s=loadSession(); const tabs=document.getElementById('tabs'); tabs.innerHTML='';
  const defs = s.role==='admin' ? ['report','reports','team'] : ['report','mine'];
  defs.forEach((k,i)=>{
    const b=document.createElement('button'); b.className='tab'+(i===0?' active':''); b.textContent=TAB_META[k][0]; b.dataset.k=k;
    b.onclick=()=>{ [...tabs.children].forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderPanel(k); };
    tabs.appendChild(b);
  });
  renderPanel(defs[0]);
}
function setHead(k){ document.getElementById('pageTitle').textContent=TAB_META[k][0]; document.getElementById('pageSub').textContent=TAB_META[k][1]; }
function renderPanel(k){
  setHead(k); const p=document.getElementById('panel');
  if(k==='report') return renderReport(p);
  if(k==='reports') return renderReports(p,false);
  if(k==='mine')   return renderReports(p,true);
  if(k==='team')   return renderTeam(p);
}

/* ===== members cache + phone lookup ===== */
async function ensureMembers(){ if(membersCache) return membersCache; const r=await api('members'); membersCache=(r.members||[]); return membersCache; }
async function ensurePhoneMap(){
  if(phoneMap) return phoneMap;
  const ms=await ensureMembers();
  phoneMap={};
  ms.forEach(m=>{ if(m.name) phoneMap[String(m.name).trim().toLowerCase()]=m.phone||""; });
  return phoneMap;
}
function phoneFor(name){ if(!phoneMap) return ""; return phoneMap[String(name||"").trim().toLowerCase()]||""; }

/* ===== REPORT ===== */
function lastSunday(){ const d=new Date(); d.setDate(d.getDate()-((d.getDay())%7)); return d.toISOString().slice(0,10); }
function avatarHTML(m){ return m.photo?`<span class="avatar-sm"><img src="${m.photo}" onerror="this.parentNode.textContent='${initials(m.name)}'"></span>`:`<span class="avatar-sm">${initials(m.name)}</span>`; }
function renderReport(p){
  let picked=null;
  p.innerHTML=`
    <div class="card">
      <h2>Report a member's absence</h2>
      <p class="lead">Search a registered member, then record that they were not around.</p>
      <div class="row">
        <div class="field full"><label>Find member</label>
          <div class="search-box"><input id="msearch" placeholder="Start typing a member's name…" autocomplete="off"><div class="results" id="mresults"></div></div>
          <div class="picked" id="mpicked"><div><div class="px-name" id="pxName"></div><div class="px-dept" id="pxDept"></div></div><button class="px-clear" id="pxClear">Change</button></div>
        </div>
        <div class="field"><label>Service date</label><input type="date" id="svcDate" value="${lastSunday()}"></div>
        <div class="field"><label>Status</label><select id="status"><option>Absent</option><option>Present</option></select></div>
        <div class="field full"><label>Reason (optional)</label><input id="reason" placeholder="e.g. travelled, sick, no reason given"></div>
        <div class="field full"><label>Notes (optional)</label><textarea id="notes" rows="2" placeholder="Anything the follow-up team should know"></textarea></div>
      </div>
      <button class="btn btn-green" id="submitReport" style="margin-top:4px"><span class="spin" id="repSpin"></span><span id="repLbl">Submit report</span></button>
      <div class="err" id="repErr"></div>
    </div>`;
  const search=p.querySelector('#msearch'), results=p.querySelector('#mresults'), pick=p.querySelector('#mpicked');
  ensureMembers();
  search.addEventListener('input', async ()=>{
    const q=search.value.trim().toLowerCase(); results.innerHTML='';
    if(q.length<2){ results.classList.remove('show'); return; }
    const ms=await ensureMembers();
    const hits=ms.filter(m=>(m.name||'').toLowerCase().includes(q)).slice(0,8);
    if(!hits.length){ results.innerHTML='<div class="res-item"><span class="muted">No match found</span></div>'; results.classList.add('show'); return; }
    hits.forEach(m=>{ const d=document.createElement('div'); d.className='res-item';
      d.innerHTML=`${avatarHTML(m)}<div><div class="nm">${esc(m.name)}</div><small>${esc(m.departments||'No department')}</small></div>`;
      d.onclick=()=>{ picked=m; p.querySelector('#pxName').textContent=m.name; p.querySelector('#pxDept').textContent=m.departments||'No department on record';
        pick.classList.add('show'); search.value=''; results.classList.remove('show'); };
      results.appendChild(d); });
    results.classList.add('show');
  });
  document.addEventListener('click',e=>{ const sb=p.querySelector('.search-box'); if(sb && !sb.contains(e.target)) results.classList.remove('show'); });
  p.querySelector('#pxClear').onclick=()=>{ picked=null; pick.classList.remove('show'); };
  p.querySelector('#submitReport').onclick=async ()=>{
    const erEl=p.querySelector('#repErr'); erEl.style.display='none';
    if(!picked){ erEl.textContent="Please search and select a member first."; erEl.style.display='block'; return; }
    const sp=p.querySelector('#repSpin'),lbl=p.querySelector('#repLbl'),btn=p.querySelector('#submitReport');
    sp.style.display='inline-block';lbl.textContent='Submitting…';btn.disabled=true;
    const r=await api('report',{ reporterName:loadSession().name, memberName:picked.name, memberDept:picked.departments,
      serviceDate:p.querySelector('#svcDate').value, status:p.querySelector('#status').value,
      reason:p.querySelector('#reason').value.trim(), notes:p.querySelector('#notes').value.trim() });
    sp.style.display='none';lbl.textContent='Submit report';btn.disabled=false;
    if(r.status==='success'){ toast('Report submitted ✓','ok'); picked=null; pick.classList.remove('show');
      p.querySelector('#reason').value=''; p.querySelector('#notes').value=''; }
    else { erEl.textContent=r.message||"Could not submit."; erEl.style.display='block'; }
  };
}

/* ===== REPORTS ===== */
const STAT_ICONS={
  total:['#eef6fb','#0B79B7','<path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13"/><path d="M8 9h8M8 13h5"/>'],
  absent:['#fdeaea','#c0392b','<circle cx="12" cy="8" r="3.2"/><path d="M5 20c0-3.3 3-5.5 7-5.5s7 2.2 7 5.5"/>'],
  members:['#e9f7ea','#1f7a2a','<circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2.3"/><path d="M3 19c0-3 2.6-5 6-5s6 2 6 5M15 19c0-2 1.4-3.4 4-3.4"/>'],
  date:['#f1ecfb','#6b4ea8','<rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/>']
};
function statCard(key,val,label){ const a=STAT_ICONS[key];
  return `<div class="stat"><div class="ic" style="background:${a[0]};color:${a[1]}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${a[2]}</svg></div><div class="v">${val}</div><div class="k">${label}</div></div>`; }
/* normalise a service value to a YYYY-MM-DD string for date comparisons */
function toISO(d){ if(!d) return ''; const x=new Date(d); return isNaN(x)?'':x.toISOString().slice(0,10); }

async function renderReports(p, mineOnly){
  p.innerHTML=`<div id="rstats" class="stats"></div>
    <div class="card">
      <div class="toolbar">
        <div class="tb-field" style="flex:1 1 180px"><label>Search member</label><input id="rsearch" placeholder="Search member…"></div>
        <div class="tb-field" style="flex:1 1 180px"><label>Department</label><select id="rdept"><option value="">All departments</option>${DEPARTMENTS.map(d=>`<option>${d}</option>`).join('')}</select></div>
        <div class="tb-field"><label>Service from</label><input type="date" id="rfrom"></div>
        <div class="tb-field"><label>Service to</label><input type="date" id="rto"></div>
        <button class="tb-clear" id="rclear">Clear</button>
      </div>
      <div class="filter-note" id="rnote"></div>
      <div id="rtable"><div class="empty"><div class="skeleton" style="width:60%;margin:8px auto"></div><div class="skeleton" style="width:40%;margin:8px auto"></div></div></div>
    </div>`;

  /* load reports + phone map in parallel */
  const [r] = await Promise.all([ api('reports'), ensurePhoneMap() ]);
  const all=(r.reports||[]);   // already newest-first from backend

  /* stats always reflect the FULL set so the latest report is always present on the dashboard */
  const absent=all.filter(x=>String(x.status).toLowerCase()!=='present').length;
  const distinct=new Set(all.map(x=>x.member)).size;
  const latest=all.length?fmtDate(all[0].date):'—';
  p.querySelector('#rstats').innerHTML=
    statCard('total',all.length, mineOnly?'My reports':'Total reports')+
    statCard('absent',absent,'Absences logged')+
    statCard('members',distinct,'Members covered')+
    statCard('date',latest,'Latest report');

  const draw=()=>{
    const q=(p.querySelector('#rsearch').value||'').toLowerCase();
    const dep=p.querySelector('#rdept').value;
    const from=p.querySelector('#rfrom').value;
    const to=p.querySelector('#rto').value;
    const filtering=!!(q||dep||from||to);
    const rows=all.filter(x=>{
      if(q && !(x.member||'').toLowerCase().includes(q)) return false;
      if(dep && !(x.dept||'').includes(dep)) return false;
      const iso=toISO(x.service);
      if(from && (!iso || iso<from)) return false;
      if(to && (!iso || iso>to)) return false;
      return true;
    });
    p.querySelector('#rnote').textContent = filtering
      ? `Showing ${rows.length} of ${all.length} report${all.length===1?'':'s'} (filtered)`
      : `Showing all ${all.length} report${all.length===1?'':'s'}, newest first`;
    const t=p.querySelector('#rtable');
    if(!rows.length){ t.innerHTML=emptyState('No reports match your filter.'); return; }
    t.innerHTML=`<table class="tbl"><thead><tr><th>Member</th><th>Phone</th><th>Department</th><th>Service</th><th>Status</th><th>Reason</th>${mineOnly?'':'<th>Reported by</th>'}</tr></thead><tbody>${
      rows.map(x=>{
        const ph=phoneFor(x.member);
        const phCell=ph?`<a class="phone-link" href="tel:${esc(String(ph).replace(/\s+/g,''))}">${esc(ph)}</a>`:'<span class="muted">—</span>';
        return `<tr>
          <td data-label="Member"><b>${esc(x.member)}</b>${x.notes?`<br><small class="muted">${esc(x.notes)}</small>`:''}</td>
          <td data-label="Phone">${phCell}</td>
          <td data-label="Department">${esc(x.dept||'—')}</td>
          <td data-label="Service">${fmtDate(x.service)}</td>
          <td data-label="Status"><span class="pill ${String(x.status).toLowerCase()==='present'?'present':''}">${esc(x.status)}</span></td>
          <td data-label="Reason">${esc(x.reason||'—')}</td>
          ${mineOnly?'':`<td data-label="Reported by">${esc(x.reporterName||x.reporter)}</td>`}</tr>`;
      }).join('')
    }</tbody></table>`;
  };
  p.querySelector('#rsearch').addEventListener('input',draw);
  p.querySelector('#rdept').addEventListener('change',draw);
  p.querySelector('#rfrom').addEventListener('change',draw);
  p.querySelector('#rto').addEventListener('change',draw);
  p.querySelector('#rclear').addEventListener('click',()=>{ p.querySelector('#rsearch').value=''; p.querySelector('#rdept').value=''; p.querySelector('#rfrom').value=''; p.querySelector('#rto').value=''; draw(); });
  draw();
}

/* ===== TEAM ===== */
async function renderTeam(p){
  p.innerHTML=`
    <div class="card">
      <h2>Add a follow-up team member</h2>
      <p class="lead">Create a login. They'll use it to report absences.</p>
      <div class="row">
        <div class="field"><label>Full name</label><input id="nFull" placeholder="e.g. Sister Grace"></div>
        <div class="field"><label>Username</label><input id="nUser" placeholder="e.g. grace"></div>
        <div class="field"><label>Password</label><input id="nPass" type="text" placeholder="Set a password"></div>
        <div class="field"><label>Role</label><select id="nRole"><option value="followup">Follow-up member</option><option value="admin">Admin</option></select></div>
        <div class="field full"><label>Assigned department(s) — optional</label><input id="nDept" placeholder="e.g. Welfare, Choir / Music"></div>
      </div>
      <button class="btn btn-blue" id="addUserBtn" style="margin-top:4px"><span class="spin" id="uSpin"></span><span id="uLbl">Create login</span></button>
      <div class="err" id="uErr"></div>
    </div>
    <div class="card"><h2>Team members</h2><div id="uList"><div class="empty"><div class="skeleton" style="width:50%;margin:8px auto"></div></div></div></div>`;
  p.querySelector('#addUserBtn').onclick=async ()=>{
    const erEl=p.querySelector('#uErr'); erEl.style.display='none';
    const payload={ newFullName:p.querySelector('#nFull').value.trim(), newUsername:p.querySelector('#nUser').value.trim(),
      newPassword:p.querySelector('#nPass').value, newRole:p.querySelector('#nRole').value, newDepartments:p.querySelector('#nDept').value.trim() };
    if(!payload.newUsername||!payload.newPassword){ erEl.textContent="Username and password are required."; erEl.style.display='block'; return; }
    const sp=p.querySelector('#uSpin'),lbl=p.querySelector('#uLbl'),btn=p.querySelector('#addUserBtn');
    sp.style.display='inline-block';lbl.textContent='Saving…';btn.disabled=true;
    const r=await api('addUser',payload);
    sp.style.display='none';lbl.textContent='Create login';btn.disabled=false;
    if(r.status==='success'){ toast('Team member added ✓','ok'); ['nFull','nUser','nPass','nDept'].forEach(id=>p.querySelector('#'+id).value=''); loadUsers(p); }
    else { erEl.textContent=r.message||"Could not add."; erEl.style.display='block'; }
  };
  loadUsers(p);
}
async function loadUsers(p){
  const r=await api('listUsers'); const list=p.querySelector('#uList'); const us=(r.users||[]);
  if(!us.length){ list.innerHTML=emptyState('No team members yet.'); return; }
  list.innerHTML=us.map(u=>`<div class="u-row"><div class="avatar-sm">${initials(u.fullName||u.username)}</div>
    <div class="u-main"><b>${esc(u.fullName||u.username)}</b> <span class="tag ${u.active?'':'off'}">${u.active?esc(u.role):'disabled'}</span><small>@${esc(u.username)}${u.departments?(' · '+esc(u.departments)):''}</small></div>
    <button class="btn ${u.active?'btn-ghost':'btn-green'}" data-u="${esc(u.username)}" data-a="${u.active?0:1}" style="padding:8px 14px;font-size:13px">${u.active?'Disable':'Enable'}</button></div>`).join('');
  list.querySelectorAll('button[data-u]').forEach(b=>b.onclick=async ()=>{ b.disabled=true; await api('setActive',{username:b.dataset.u,active:b.dataset.a==='1'}); toast('Updated','ok'); loadUsers(p); });
}

/* ---- utils ---- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(d){ if(!d) return '—'; const x=new Date(d); return isNaN(x)? esc(d): x.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}); }
function emptyState(msg){ return `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9fb4c4" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 12h8M8 15h5"/></svg>${esc(msg)}</div>`; }

/* ---- boot ---- */
if(loadSession() && loadSession().token){ enterApp(); }
